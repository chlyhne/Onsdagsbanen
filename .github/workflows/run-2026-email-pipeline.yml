name: Run 2026 Results Pipeline

on:
  workflow_dispatch:
    inputs:
      trigger_from:
        description: Sender address that triggered this run
        required: false
        type: string
      trigger_subject:
        description: Subject line that triggered this run
        required: false
        type: string
      dry_run:
        description: Validate and compose email without sending
        required: false
        default: false
        type: boolean
      recipient_override:
        description: Optional recipient override list (comma/newline-separated emails)
        required: false
        type: string
      persist_recipients:
        description: Persist recipient_override addresses to encrypted recipients_repo.enc
        required: false
        default: false
        type: boolean
      append_only:
        description: Recipient list update mode without building/sending result emails
        required: false
        default: false
        type: boolean
      delete_mode:
        description: Remove recipient_override addresses from encrypted recipients registry
        required: false
        default: false
        type: boolean
      send_unsubscribe_confirmation:
        description: Send a confirmation email for afmeld resultater unsubscribe requests
        required: false
        default: false
        type: boolean
      unsubscribe_recipient:
        description: Recipient email for unsubscribe confirmation
        required: false
        type: string
      duty_mode:
        description: Update redress_duty_assignments.csv from dommertjans subject command
        required: false
        default: false
        type: boolean
      duty_race:
        description: Duty race label, for example R3
        required: false
        type: string
      duty_participant_number:
        description: Participant number from participant_registry_2026.csv
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: m2s-results-email-pipeline
  queue: max
  cancel-in-progress: false

jobs:
  run-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install cryptography

      - name: Validate required secrets
        env:
          M2S_GMAIL_FROM: ${{ secrets.M2S_GMAIL_FROM }}
          M2S_GMAIL_APP_PASSWORD: ${{ secrets.M2S_GMAIL_APP_PASSWORD }}
          M2S_RECIPIENTS_KEY: ${{ secrets.M2S_RECIPIENTS_KEY }}
          DUTY_MODE: ${{ inputs.duty_mode }}
        run: |
          missing=0
          required_names=(M2S_GMAIL_FROM M2S_GMAIL_APP_PASSWORD)
          if [ "${DUTY_MODE}" != "true" ]; then
            required_names+=(M2S_RECIPIENTS_KEY)
          fi
          for name in "${required_names[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare recipients file
        if: ${{ inputs.duty_mode != true && inputs.duty_mode != 'true' }}
        id: prepare_recipients
        env:
          RECIPIENT_OVERRIDE: ${{ inputs.recipient_override }}
          PERSIST_RECIPIENTS: ${{ inputs.persist_recipients }}
          RECIPIENTS_KEY: ${{ secrets.M2S_RECIPIENTS_KEY }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          from cryptography.fernet import Fernet, InvalidToken

          EMAIL_RE = re.compile(r"^[^@\s]+@[^@\s]+\.[^@\s]+$")
          REGISTRY_PATH = Path("recipients_repo.enc")
          EFFECTIVE_PATH = Path("recipients.txt")

          def dedupe(values):
            seen = set()
            ordered = []
            for value in values:
              lowered = value.lower()
              if lowered in seen:
                continue
              seen.add(lowered)
              ordered.append(lowered)
            return ordered

          def parse_emails(raw, label, *, allow_comments=False, separators=("\n",), strict=True):
            text = str(raw or "")
            for sep in separators:
              text = text.replace(sep, "\n")
            parsed = []
            invalid = []
            for raw_line in text.splitlines():
              line = raw_line.strip()
              if not line:
                continue
              if allow_comments and line.startswith("#"):
                continue
              if not EMAIL_RE.fullmatch(line):
                invalid.append(line)
                continue
              parsed.append(line)
            if strict and invalid:
              raise RuntimeError(f"Invalid email(s) in {label}: {', '.join(invalid)}")
            return dedupe(parsed)

          def load_registry_emails(path, key_text):
            if not path.exists():
              return []

            cipher_text = path.read_text(encoding="utf-8").strip()
            if not cipher_text:
              return []

            try:
              decrypted = Fernet(key_text.encode("utf-8")).decrypt(
                cipher_text.encode("utf-8")
              )
            except InvalidToken as exc:
              raise RuntimeError(
                "Could not decrypt recipients_repo.enc. Check M2S_RECIPIENTS_KEY and file contents."
              ) from exc

            return parse_emails(
              decrypted.decode("utf-8"),
              "decrypted recipients registry",
            )

          override_raw = os.getenv("RECIPIENT_OVERRIDE", "")
          persist_requested = os.getenv("PERSIST_RECIPIENTS", "").strip().lower() == "true"
          recipients_key = os.getenv("RECIPIENTS_KEY", "").strip()

          if not recipients_key:
            raise RuntimeError("Missing RECIPIENTS_KEY from workflow secret.")

          registry_emails = load_registry_emails(REGISTRY_PATH, recipients_key)

          override_emails = parse_emails(
            override_raw,
            "recipient_override",
            separators=("\n", ",", ";"),
          )

          should_persist = persist_requested and len(override_emails) > 0

          if override_emails:
            effective_emails = override_emails
            source_label = "recipient_override"
          elif registry_emails:
            effective_emails = registry_emails
            source_label = "recipients_repo.enc"
          else:
            effective_emails = []
            source_label = "none"

          if not effective_emails:
            raise RuntimeError(
              "No recipients available. Populate encrypted recipients_repo.enc or provide recipient_override."
            )

          EFFECTIVE_PATH.write_text("\n".join(effective_emails) + "\n", encoding="utf-8")
          print(f"Using recipients from {source_label} ({len(effective_emails)} address(es)).")

          github_output = os.getenv("GITHUB_OUTPUT")
          if github_output:
            with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"should_persist={'true' if should_persist else 'false'}\n")
          PY

      - name: Log trigger metadata
        run: |
          echo "Triggered from: ${{ inputs.trigger_from }}"
          echo "Trigger subject: ${{ inputs.trigger_subject }}"

      - name: Apply dommertjans redress
        id: apply_duty_redress
        if: ${{ inputs.duty_mode == true || inputs.duty_mode == 'true' }}
        run: |
          python scripts/update_duty_redress.py \
            --race "${{ inputs.duty_race }}" \
            --participant-number "${{ inputs.duty_participant_number }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Build 2026 PDF
        if: ${{ inputs.append_only != true && inputs.append_only != 'true' && inputs.duty_mode != true && inputs.duty_mode != 'true' }}
        run: python run_2026.py

      - name: Send or dry-run email
        if: ${{ inputs.append_only != true && inputs.append_only != 'true' && inputs.duty_mode != true && inputs.duty_mode != 'true' }}
        env:
          M2S_GMAIL_FROM: ${{ secrets.M2S_GMAIL_FROM }}
          M2S_GMAIL_APP_PASSWORD: ${{ secrets.M2S_GMAIL_APP_PASSWORD }}
        run: |
          args=(--yes)

          if [ "${{ inputs.trigger_from }}" = "hummesse@gmail.com" ]; then
            args+=(--include-refresh-instruction)
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi

          python send_results_gmail.py "${args[@]}"

      - name: Persist recipients registry
        id: persist_registry
        if: ${{ inputs.duty_mode != true && inputs.duty_mode != 'true' && steps.prepare_recipients.outputs.should_persist == 'true' }}
        env:
          RECIPIENT_OVERRIDE: ${{ inputs.recipient_override }}
          RECIPIENTS_KEY: ${{ secrets.M2S_RECIPIENTS_KEY }}
          DELETE_MODE: ${{ inputs.delete_mode }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          from cryptography.fernet import Fernet, InvalidToken

          EMAIL_RE = re.compile(r"^[^@\s]+@[^@\s]+\.[^@\s]+$")
          REGISTRY_PATH = Path("recipients_repo.enc")

          def dedupe(values):
            seen = set()
            ordered = []
            for value in values:
              lowered = value.lower()
              if lowered in seen:
                continue
              seen.add(lowered)
              ordered.append(lowered)
            return ordered

          def parse_emails(raw, label, *, allow_comments=False, separators=("\n",), strict=True):
            text = str(raw or "")
            for sep in separators:
              text = text.replace(sep, "\n")
            parsed = []
            invalid = []
            for raw_line in text.splitlines():
              line = raw_line.strip()
              if not line:
                continue
              if allow_comments and line.startswith("#"):
                continue
              if not EMAIL_RE.fullmatch(line):
                invalid.append(line)
                continue
              parsed.append(line)
            if strict and invalid:
              raise RuntimeError(f"Invalid email(s) in {label}: {', '.join(invalid)}")
            return dedupe(parsed)

          def load_registry_emails(path, key_text):
            if not path.exists():
              return []

            cipher_text = path.read_text(encoding="utf-8").strip()
            if not cipher_text:
              return []

            try:
              decrypted = Fernet(key_text.encode("utf-8")).decrypt(
                cipher_text.encode("utf-8")
              )
            except InvalidToken as exc:
              raise RuntimeError(
                "Could not decrypt recipients_repo.enc. Check M2S_RECIPIENTS_KEY and file contents."
              ) from exc

            return parse_emails(
              decrypted.decode("utf-8"),
              "decrypted recipients registry",
            )

          def encrypt_registry(emails, key_text):
            plain_text = "\n".join(emails) + "\n"
            token = Fernet(key_text.encode("utf-8")).encrypt(
              plain_text.encode("utf-8")
            )
            return token.decode("utf-8") + "\n"

          recipients_key = os.getenv("RECIPIENTS_KEY", "").strip()
          if not recipients_key:
            raise RuntimeError("Missing RECIPIENTS_KEY from workflow secret.")

          delete_mode = os.getenv("DELETE_MODE", "").strip().lower() == "true"

          override_emails = parse_emails(
            os.getenv("RECIPIENT_OVERRIDE", ""),
            "recipient_override",
            separators=("\n", ",", ";"),
          )
          registry_emails = load_registry_emails(REGISTRY_PATH, recipients_key)

          if delete_mode:
            remove_set = set(override_emails)
            merged_registry = [email for email in registry_emails if email not in remove_set]
            removed_count = len(registry_emails) - len(merged_registry)
          else:
            base_registry = registry_emails
            merged_registry = dedupe(base_registry + override_emails)
            removed_count = 0

          persist_changed = merged_registry != registry_emails
          if persist_changed:
            encrypted_payload = encrypt_registry(merged_registry, recipients_key)
            REGISTRY_PATH.write_text(encrypted_payload, encoding="utf-8")
            operation = "Deleted" if delete_mode else "Persisted"
            print(f"{operation} to {len(merged_registry)} recipient(s) in recipients_repo.enc")
          else:
            print("No recipient registry changes needed.")

          github_output = os.getenv("GITHUB_OUTPUT")
          if github_output:
            with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"persist_changed={'true' if persist_changed else 'false'}\n")
              fh.write(f"removed_count={removed_count}\n")
          PY

      - name: Commit persisted recipients registry
        id: commit_registry
        if: steps.persist_registry.outputs.persist_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add recipients_repo.enc
          git commit -m "chore: update recipients registry from email trigger"
          git push

      - name: Commit dommertjans redress update
        id: commit_duty_redress
        if: ${{ inputs.duty_mode == true || inputs.duty_mode == 'true' }}
        run: |
          if git diff --quiet -- redress_duty_assignments.csv; then
            echo "No duty redress changes to commit."
            echo "commit_made=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add redress_duty_assignments.csv
          git commit -m "chore: ${{ steps.apply_duty_redress.outputs.action }} dommertjans redress for ${{ steps.apply_duty_redress.outputs.race }} #${{ steps.apply_duty_redress.outputs.participant_number }}"
          git push
          echo "commit_made=true" >> "$GITHUB_OUTPUT"

      - name: Send dommertjans confirmation
        if: ${{ (inputs.duty_mode == true || inputs.duty_mode == 'true') && inputs.trigger_from != '' && steps.apply_duty_redress.outcome == 'success' && steps.commit_duty_redress.outcome == 'success' }}
        env:
          M2S_GMAIL_FROM: ${{ secrets.M2S_GMAIL_FROM }}
          M2S_GMAIL_APP_PASSWORD: ${{ secrets.M2S_GMAIL_APP_PASSWORD }}
          DUTY_CONFIRM_TO: ${{ inputs.trigger_from }}
          DUTY_ACTION: ${{ steps.apply_duty_redress.outputs.action }}
          DUTY_YEAR: ${{ steps.apply_duty_redress.outputs.year }}
          DUTY_RACE: ${{ steps.apply_duty_redress.outputs.race }}
          DUTY_NUMBER: ${{ steps.apply_duty_redress.outputs.participant_number }}
          DUTY_COMPETITOR: ${{ steps.apply_duty_redress.outputs.competitor }}
          DUTY_SERIES: ${{ steps.apply_duty_redress.outputs.series }}
          DUTY_GROUP: ${{ steps.apply_duty_redress.outputs.group }}
          DUTY_REMOVED_COUNT: ${{ steps.apply_duty_redress.outputs.removed_count }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage

          from_email = os.getenv("M2S_GMAIL_FROM", "").strip()
          app_password = os.getenv("M2S_GMAIL_APP_PASSWORD", "").strip()
          recipient = os.getenv("DUTY_CONFIRM_TO", "").strip().lower()
          action = os.getenv("DUTY_ACTION", "updated").strip()
          year = os.getenv("DUTY_YEAR", "2026").strip()
          race = os.getenv("DUTY_RACE", "").strip().upper()
          number = os.getenv("DUTY_NUMBER", "").strip()
          competitor = os.getenv("DUTY_COMPETITOR", "").strip()
          series = os.getenv("DUTY_SERIES", "").strip()
          group = os.getenv("DUTY_GROUP", "").strip()
          removed_count_raw = os.getenv("DUTY_REMOVED_COUNT", "0").strip()

          try:
            removed_count = int(removed_count_raw)
          except ValueError:
            removed_count = 0

          if not from_email or not app_password:
            raise RuntimeError("Missing Gmail credentials for dommertjans confirmation.")
          if not recipient:
            raise RuntimeError("Missing dommertjans confirmation recipient.")
          if not race or not number:
            raise RuntimeError("Missing dommertjans confirmation details.")

          message = EmailMessage()
          message["From"] = from_email
          message["To"] = recipient
          if number == "0":
            if action == "removed":
              message["Subject"] = f"Dommertjans fjernet: {race}"
              body = (
                f"Fjernede dommertjans-redress i {year}.\n\n"
                f"Race: {race}\n"
                f"Fjernede rækker: {removed_count}\n"
              )
            else:
              message["Subject"] = f"Ingen dommertjans fundet: {race}"
              body = (
                f"Der var ingen dommertjans-redress at fjerne i {year}.\n\n"
                f"Race: {race}\n"
                f"Fjernede rækker: {removed_count}\n"
              )
          else:
            message["Subject"] = f"Dommertjans registreret: {race} #{number}"
            body = (
              f"{action.capitalize()} dommertjans-redress i {year}.\n\n"
              f"Race: {race}\n"
              f"Deltagernummer: {number}\n"
              f"Navn: {competitor}\n"
              f"Serie: {series}\n"
              f"Bane: {group}\n"
            )
          message.set_content(body)

          with smtplib.SMTP("smtp.gmail.com", 587, timeout=30) as smtp:
            smtp.ehlo()
            smtp.starttls()
            smtp.ehlo()
            smtp.login(from_email, app_password)
            smtp.send_message(message, to_addrs=[recipient])

          print("Dommertjans confirmation email sent.")
          PY

      - name: Send unsubscribe confirmation
        if: ${{ (inputs.send_unsubscribe_confirmation == true || inputs.send_unsubscribe_confirmation == 'true') && inputs.unsubscribe_recipient != '' && steps.persist_registry.outcome == 'success' && (steps.persist_registry.outputs.persist_changed != 'true' || steps.commit_registry.outcome == 'success') }}
        env:
          M2S_GMAIL_FROM: ${{ secrets.M2S_GMAIL_FROM }}
          M2S_GMAIL_APP_PASSWORD: ${{ secrets.M2S_GMAIL_APP_PASSWORD }}
          UNSUBSCRIBE_RECIPIENT: ${{ inputs.unsubscribe_recipient }}
          REMOVED_COUNT: ${{ steps.persist_registry.outputs.removed_count }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage

          from_email = os.getenv("M2S_GMAIL_FROM", "").strip()
          app_password = os.getenv("M2S_GMAIL_APP_PASSWORD", "").strip()
          recipient = os.getenv("UNSUBSCRIBE_RECIPIENT", "").strip().lower()
          removed_count_raw = os.getenv("REMOVED_COUNT", "0").strip()

          if not from_email or not app_password:
            raise RuntimeError("Missing Gmail credentials for unsubscribe confirmation.")
          if not recipient:
            raise RuntimeError("Missing unsubscribe recipient.")

          try:
            removed_count = int(removed_count_raw)
          except ValueError:
            removed_count = 0

          if removed_count > 0:
            body = (
              "Din email er nu afmeldt resultatlisten.\n\n"
              "Du vil ikke modtage flere resultatmails, medmindre du tilmelder dig igen."
            )
          else:
            body = (
              "Din email var allerede afmeldt resultatlisten.\n\n"
              "Du vil ikke modtage resultatmails."
            )

          message = EmailMessage()
          message["From"] = from_email
          message["To"] = recipient
          message["Subject"] = "Afmelding bekræftet"
          message.set_content(body)

          with smtplib.SMTP("smtp.gmail.com", 587, timeout=30) as smtp:
            smtp.ehlo()
            smtp.starttls()
            smtp.ehlo()
            smtp.login(from_email, app_password)
            smtp.send_message(message, to_addrs=[recipient])

          print("Unsubscribe confirmation email sent.")
          PY
